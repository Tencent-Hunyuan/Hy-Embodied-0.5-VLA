# Default Hy-VLA RoboDojo evaluation configuration.
#
# Task-side knobs are owned by the caller / RoboDojo runner. This file only
# contains Hy-VLA-specific model, normalization, decoding, and MEM settings.

# --- Checkpoint -----------------------------------------------------------
# HuggingFace repo id or local directory containing config.json +
# model.safetensors + norm_stats.pkl. When norm_path is null, local
# directories auto-resolve <ckpt_path>/norm_stats.pkl.
ckpt_path: tencent/Hy-VLA-RoboDojo
norm_path: null

# --- Action decoding ------------------------------------------------------
# RoboDojo checkpoints are trained with relative RT action chunks by default.
with_absolute: False
blend_mode: rel_only

# Number of consecutive eval steps served from a single network forward.
exc_action_size: 10
exc_action_interval: 1

# --- MEM video-encoder cadence -------------------------------------------
img_history_size: 6
img_history_interval: 20

# --- UMI coordinate frame -------------------------------------------------
# Must match hy_vla/config/dataset/robodojo_hdf5.yaml and the norm_stats.pkl.
umi_coord_frame: True
umi_gripper_space: False
